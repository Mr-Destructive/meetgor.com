<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- No gradients; solid capsules only -->
  <!-- Solid Black Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Top Right Group (Slanted ~22° Left-to-Right '/') -->
  <g transform="translate(1280, 65) rotate(22)">
    <!-- Purple capsule (peek layer) -->
    <rect x="-432" y="40" width="544" height="180" rx="90" fill="#bc00ff" opacity="0.9"/>
    <!-- Cyan capsule (main layer) -->
    <rect x="-552" y="-140" width="684" height="210" rx="105" fill="#00f2ff"/>
  </g>

  <!-- Bottom Left Group (Slanted ~22° Left-to-Right '/') -->
  <g transform="translate(-80, 565) rotate(22)">
    <!-- Orange capsule (peek layer) -->
    <rect x="-112" y="-220" width="544" height="180" rx="90" fill="#ff8a00" opacity="0.9"/>
    <!-- Cyan capsule (main layer) -->
    <rect x="-112" y="-60" width="684" height="210" rx="105" fill="#00f2ff"/>
  </g>
</svg>

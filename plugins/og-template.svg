<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1640;stop-opacity:1" />
    </linearGradient>

    <!-- Cyan corner triangle clip -->
    <clipPath id="topRightClip">
      <polygon points="1200,0 1200,220 980,0" />
    </clipPath>

    <!-- Monospace font stack -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');

      text { font-family: 'Space Mono', 'Courier New', monospace; }

      .topic    { font-size: 32px; font-weight: 700; fill: #00ff88; letter-spacing: 4px; text-transform: uppercase; }
      .title    { font-size: 96px; font-weight: 700; fill: #ff6200; letter-spacing: -1px; }
      .subtitle { font-size: 72px; font-weight: 700; fill: #00d4ff; letter-spacing: 0px; }
      .brand    { font-size: 36px; font-weight: 700; fill: #00d4ff; letter-spacing: 6px; }
    </style>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- ── Top-right decorative strips ── -->
  <!-- Two parallel diagonal ribbons going NW→SE, cropped by canvas edges -->
  <!-- Cyan strip (upper) -->
  <rect x="1000" y="-120" width="480" height="85"
        fill="#00d4ff"
        transform="rotate(35, 1200, 0)" />
  <!-- Orange strip (below cyan, parallel) -->
  <rect x="960" y="-30" width="480" height="105"
        fill="#ff6200"
        transform="rotate(35, 1200, 0)" />

  <!-- ── TOPIC label (top-left) ── -->
  <!-- Replace {{TOPIC}} in your Go plugin -->
  <text x="72" y="110" class="topic">{{TOPIC}}</text>

  <!-- ── Center title block ── -->
  <!-- Replace {{TITLE}} — single line, centered -->
  <text x="600" y="310" class="title" text-anchor="middle">{{TITLE}}</text>
  <!-- Replace {{SUBTITLE}} — single line, centered -->
  <text x="600" y="420" class="subtitle" text-anchor="middle">{{SUBTITLE}}</text>

  <!-- ── Bottom-left: mg logo ── -->
  <!-- "m" in orange, "g" in cyan, bold mono -->
  <text x="72" y="572" font-family="'Space Mono','Courier New',monospace"
        font-size="72" font-weight="700" fill="#ff6200">m</text>
  <text x="119" y="572" font-family="'Space Mono','Courier New',monospace"
        font-size="72" font-weight="700" fill="#00d4ff">g</text>

  <!-- ── Bottom-right: MEET GOR brand ── -->
  <text x="1128" y="572" class="brand" text-anchor="end">MEET GOR</text>
</svg>

name: Newsletter Sync - Substack RSS to Posts

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  newsletter-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'

      - name: Run newsletter sync
        run: go run ./cmd/newsletter-sync/main.go

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain | grep -q "posts/newsletter/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Newsletter Bot"
          git add posts/newsletter/
          git commit -m "📰 sync: newsletter posts from Substack RSS"
          git push

      - name: Summary
        run: |
          echo "## Newsletter Sync" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "- Result: ✅ New posts synced" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Result: ✓ No new posts" >> $GITHUB_STEP_SUMMARY
          fi

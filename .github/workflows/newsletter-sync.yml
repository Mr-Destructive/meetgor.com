name: Newsletter Sync - Fetch from Netlify

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call Netlify newsletter function
        id: fetch
        env:
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          echo "đź“° Calling Netlify newsletter function..."
          
          RESPONSE=$(curl -X POST \
            "${NETLIFY_SITE_URL}/.netlify/functions/newsletter" \
            -H "Content-Type: application/json" \
            -s)
          
          echo "âś… Response received"
          echo "$RESPONSE" | head -c 200
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Parse and create markdown files
        id: create
        env:
          RESPONSE: ${{ steps.fetch.outputs.response }}
        run: |
          mkdir -p posts/newsletter
          echo "$RESPONSE" > /tmp/response.json
          
          # Extract each post and create file
          COUNT=$(jq -c '.posts[]' /tmp/response.json | while read -r post; do
            TITLE=$(echo "$post" | jq -r '.title')
            SLUG=$(echo "$post" | jq -r '.slug')
            DATE=$(echo "$post" | jq -r '.date')
            LINK=$(echo "$post" | jq -r '.link')
            BODY=$(echo "$post" | jq -r '.body')
            
            FILE="posts/newsletter/${SLUG}.md"
            {
              echo "---"
              echo "type: newsletter"
              echo "title: \"${TITLE}\""
              echo "date: ${DATE}"
              echo "slug: ${SLUG}"
              echo "tags: [\"newsletter\", \"substack\"]"
              echo "canonical_url: ${LINK}"
              echo "status: published"
              echo "---"
              echo ""
              echo "$BODY"
            } > "$FILE"
            echo "âś¨ Created: $FILE"
            echo "1"
          done | wc -l)
          
          if [ "$COUNT" -gt 0 ]; then
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit if changed
        if: steps.create.outputs.created == 'true'
        run: |
          if git status --porcelain | grep -q "posts/newsletter/"; then
            git config --local user.email "action@github.com"
            git config --local user.name "Newsletter Bot"
            git add posts/newsletter/
            git commit -m "đź“° sync: newsletter posts from Substack (via Netlify)"
            git push
          fi

      - name: Summary
        run: |
          echo "## Newsletter Sync via Netlify" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Function: /.netlify/functions/newsletter" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.create.outputs.created }}" >> $GITHUB_STEP_SUMMARY

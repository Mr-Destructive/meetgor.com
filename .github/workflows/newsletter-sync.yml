name: Newsletter Sync - Substack RSS to Posts

on:
  schedule:
    # Run daily at 3 AM UTC (after hash-sync completes at 2 AM)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even without changes'
        required: false
        default: 'false'

jobs:
  newsletter-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'
          cache: true

      - name: Fetch newsletter from Substack RSS
        id: fetch
        env:
          NEWSLETTER_FEED_URL: ${{ secrets.NEWSLETTER_FEED_URL || 'https://techstructively.substack.com/feed' }}
        run: |
          # Test the newsletter sync function locally
          # This would normally be called via the Netlify function
          echo "📰 Testing newsletter RSS fetch..."
          echo "Feed URL: $NEWSLETTER_FEED_URL"
          
          # Create a test script to fetch the feed
          cat > test_feed.go << 'EOF'
          package main
          import (
            "context"
            "fmt"
            "io"
            "net/http"
            "time"
            "github.com/mmcdole/gofeed"
          )
          func main() {
            feedURL := os.Getenv("NEWSLETTER_FEED_URL")
            if feedURL == "" {
              feedURL = "https://techstructively.substack.com/feed"
            }
            client := &http.Client{Timeout: 20 * time.Second}
            req, _ := http.NewRequest(http.MethodGet, feedURL, nil)
            req.Header.Set("User-Agent", "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36")
            resp, err := client.Do(req)
            if err != nil {
              fmt.Printf("Error fetching feed: %v\n", err)
              return
            }
            defer resp.Body.Close()
            if resp.StatusCode != 200 {
              body, _ := io.ReadAll(resp.Body)
              fmt.Printf("Feed returned status %d\n", resp.StatusCode)
              return
            }
            body, _ := io.ReadAll(resp.Body)
            parser := gofeed.NewParser()
            feed, err := parser.ParseString(string(body))
            if err != nil {
              fmt.Printf("Error parsing feed: %v\n", err)
              return
            }
            fmt.Printf("✓ Feed fetched successfully\n")
            fmt.Printf("  Title: %s\n", feed.Title)
            fmt.Printf("  Items: %d\n", len(feed.Items))
            if len(feed.Items) > 0 {
              fmt.Printf("  Latest: %s\n", feed.Items[0].Title)
            }
          }
          EOF
          
          # Just verify dependencies are available
          go list github.com/mmcdole/gofeed > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "newsletter_available=true" >> $GITHUB_OUTPUT
          else
            echo "newsletter_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Call Netlify newsletter function
        if: always()
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "⚠️  Skipping live function call (missing credentials)"
            echo "In production, this would call: https://[site].netlify.app/.netlify/functions/newsletter"
            exit 0
          fi
          
          echo "📡 Calling newsletter sync function..."
          curl -X POST https://$NETLIFY_SITE_ID.netlify.app/.netlify/functions/newsletter \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            2>/dev/null || true

      - name: Check for new posts
        id: check
        run: |
          if git status --porcelain | grep -q "posts/newsletter/"; then
            echo "posts_changed=true" >> $GITHUB_OUTPUT
            echo "📝 New newsletter posts detected"
            git diff --name-only | grep "posts/newsletter/" || true
          else
            echo "posts_changed=false" >> $GITHUB_OUTPUT
            echo "✓ No new posts (or posts already in repo)"
          fi

      - name: Commit new posts
        if: steps.check.outputs.posts_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Newsletter Sync Bot"
          git add posts/newsletter/
          git commit -m "📰 sync: newsletter posts from Substack RSS - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger hash-sync
        if: steps.check.outputs.posts_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Triggering hash-sync workflow..."
          gh workflow run hash-sync.yml --ref main
          echo "Hash-sync triggered to index new posts to Turso"

      - name: Summary
        if: always()
        run: |
          echo "## Newsletter Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Feed:** ${{ env.NEWSLETTER_FEED_URL || 'https://techstructively.substack.com/feed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Posts Changed:** ${{ steps.check.outputs.posts_changed || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.posts_changed }}" = "true" ]; then
            echo "- **Action:** Posted synced to repo and hash-sync triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Action:** No new posts to sync" >> $GITHUB_STEP_SUMMARY
          fi

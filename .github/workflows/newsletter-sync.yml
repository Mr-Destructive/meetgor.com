name: Newsletter Sync - Fetch from Netlify

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call Netlify newsletter function
        id: fetch
        env:
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          echo "📰 Calling Netlify newsletter function..."
          echo "URL: ${NETLIFY_SITE_URL}/.netlify/functions/newsletter"
          
          RESPONSE=$(curl -X POST \
            "${NETLIFY_SITE_URL}/.netlify/functions/newsletter" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)
          
          echo "Response: $RESPONSE"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Parse and create markdown files
        id: create
        env:
          RESPONSE: ${{ steps.fetch.outputs.response }}
        run: |
          mkdir -p posts/newsletter
          
          # For now, just verify we got a response
          echo "$RESPONSE" | jq . > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ Valid JSON response received"
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Invalid response"
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit if changed
        if: steps.create.outputs.created == 'true'
        run: |
          if git status --porcelain | grep -q "posts/newsletter/"; then
            git config --local user.email "action@github.com"
            git config --local user.name "Newsletter Bot"
            git add posts/newsletter/
            git commit -m "📰 sync: newsletter posts from Substack (via Netlify)"
            git push
          fi

      - name: Summary
        run: |
          echo "## Newsletter Sync via Netlify" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Function: /.netlify/functions/newsletter" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.create.outputs.created }}" >> $GITHUB_STEP_SUMMARY

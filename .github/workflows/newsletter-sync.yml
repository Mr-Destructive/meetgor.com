name: Newsletter Sync - Fetch from Netlify

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call Netlify newsletter function
        id: fetch
        env:
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          echo "📰 Calling Netlify newsletter function..."
          
          curl -X POST \
            "${NETLIFY_SITE_URL}/.netlify/functions/newsletter" \
            -H "Content-Type: application/json" \
            -s > /tmp/response.json
          
          echo "✅ Response received"
          head -c 200 /tmp/response.json

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'
          cache: true

      - name: Parse and create markdown files
        id: create
        run: |
          set -euo pipefail
          mkdir -p posts/newsletter
          : > /tmp/created_files.txt

          go run ./cmd/newsletter-sync \
            --materialize-json /tmp/response.json \
            --materialize-output-dir posts/newsletter \
            --materialize-created-files /tmp/created_files.txt

          if [[ -s /tmp/created_files.txt ]]; then
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync to database
        if: steps.create.outputs.created == 'true'
        env:
          TURSO_DATABASE_NAME: ${{ secrets.TURSO_DATABASE_NAME }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          go run ./cmd/newsletter-sync --db-insert

      - name: Commit if changed
        if: steps.create.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git status --porcelain | grep -q "posts/newsletter/"; then
            git config --local user.email "action@github.com"
            git config --local user.name "Newsletter Bot"
            git add posts/newsletter/
            git commit -m "📰 sync: newsletter posts from Substack (via Netlify)"
            git push
            
            # Trigger build workflow
            gh workflow run deploy.yml
          fi

      - name: Summary
        run: |
          echo "## Newsletter Sync via Netlify" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Function: /.netlify/functions/newsletter" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.create.outputs.created }}" >> $GITHUB_STEP_SUMMARY

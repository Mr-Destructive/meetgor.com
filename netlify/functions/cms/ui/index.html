<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Techstructive CMS</title>
  <style>
    :root { --bg:#f7f7f7; --panel:#fff; --text:#222; --line:#ddd; --accent:#0b6bcb; --ok:#117a3b; --err:#b42318; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 740px) { .grid { grid-template-columns: 1fr; } }
    label { display:block; font-weight: 600; margin: 8px 0 6px; }
    input, textarea, select { width: 100%; padding: 10px; border:1px solid var(--line); border-radius: 8px; font: inherit; }
    textarea { min-height: 180px; }
    .row { display:flex; gap: 8px; flex-wrap: wrap; }
    button { border:0; background: var(--accent); color:#fff; padding:10px 14px; border-radius: 8px; cursor: pointer; font-weight:600; }
    button.secondary { background:#555; }
    .note { font-size: 13px; color:#555; margin-top: 8px; }
    .status { white-space: pre-wrap; background: #fafafa; border:1px solid var(--line); padding:10px; border-radius:8px; min-height: 70px; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Techstructive CMS</h1>
      <div class="note">Uses existing Netlify functions: <code>api</code>, <code>sync-db</code>, <code>trigger-build</code>.</div>
    </div>

    <div class="panel">
      <h2>Credentials</h2>
      <div class="grid">
        <div>
          <label for="username">Username</label>
          <input id="username" placeholder="meet-gor" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="your password" />
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Create Post</h2>
      <div class="grid">
        <div>
          <label for="title">Title</label>
          <input id="title" placeholder="Post title" />
        </div>
        <div>
          <label for="type">Type</label>
          <select id="type">
            <option value="posts">posts</option>
            <option value="newsletter">newsletter</option>
            <option value="til">til</option>
            <option value="projects">projects</option>
            <option value="links">links</option>
            <option value="quotes">quotes</option>
            <option value="sqlog">sqlog</option>
          </select>
        </div>
      </div>
      <div class="grid">
        <div>
          <label for="slug">Slug (optional)</label>
          <input id="slug" placeholder="slug-auto-if-empty" />
        </div>
        <div>
          <label for="tags">Tags (comma separated)</label>
          <input id="tags" placeholder="go, sqlite" />
        </div>
      </div>
      <label for="content">Markdown Content</label>
      <textarea id="content" placeholder="# Hello"></textarea>
      <div class="row" style="margin-top:10px;">
        <button id="createBtn">Create Post</button>
      </div>
      <div class="note">Post metadata is auto-generated from the fields above.</div>
    </div>

    <div class="panel">
      <h2>Sync + Build</h2>
      <div class="row">
        <button id="syncBtn" class="secondary">Sync DB</button>
        <button id="buildBtn">Trigger Build</button>
      </div>
    </div>

    <div class="panel">
      <h2>Status</h2>
      <div id="status" class="status">Ready.</div>
    </div>
  </div>

  <script src="/cms/app.js"></script>
</body>
</html>

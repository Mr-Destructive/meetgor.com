<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Colophon | {{ .Config.Blog.Name }}</title>
    <meta name="description" content="Colophon and site map for {{ .Config.Blog.Name }}">
    <meta name="author" content="Meet Gor">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ .Config.Blog.BaseUrl }}/colophon">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:url" content="{{ .Config.Blog.BaseUrl }}/colophon">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Colophon | {{ .Config.Blog.Name }}">
    <meta property="og:description" content="Colophon and site map for {{ .Config.Blog.Name }}">
    <meta property="og:image" content="{{ .Config.Blog.BaseUrl }}/mgicon.png">
    <meta property="og:site_name" content="{{ .Config.Blog.Name }}">
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@meetgor711">
    <meta name="twitter:creator" content="@meetgor711">
    <meta name="twitter:title" content="Colophon | {{ .Config.Blog.Name }}">
    <meta name="twitter:description" content="Colophon and site map for {{ .Config.Blog.Name }}">
    <meta name="twitter:image" content="{{ .Config.Blog.BaseUrl }}/mgicon.png">
    
    <!-- Favicon -->
    <link rel="icon" href="/mgicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/mgicon.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/code-block.css">
    <link rel="stylesheet" href="/style.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EET2ZX4QY1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-EET2ZX4QY1');
    </script>
</head>
<body>
    {{ template "header.html" . }}
    
    <main class="container">
        <article class="page-content">
            <h1>Colophon</h1>
            <div class="post-content">
                {{ if .Post.Content }}{{ .Post.Content }}{{ end }}
            </div>

            <section class="post-list">
                <h2>Feeds</h2>
                <ul class="unord-list">
                    {{ range .FeedPosts }}
                    <li><a href="/{{ $.Config.Blog.PrefixURL }}{{ .Slug }}">{{ .Title }}</a></li>
                    {{ end }}
                </ul>
            </section>

            <section class="post-list">
                <h2>Pages</h2>
                <ul class="unord-list">
                    <li><a href="/{{ $.Config.Blog.PrefixURL }}">Home</a></li>
                    {{ range $slug, $page := .Config.Blog.PagesConfig }}
                    <li><a href="/{{ $.Config.Blog.PrefixURL }}{{ $slug }}">{{ $slug }}</a></li>
                    {{ end }}
                </ul>
            </section>
        </article>
    </main>
    
    {{ template "footer.html" . }}
    
    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const body = document.body;
            
            if (!themeToggle) return;
            
            // Check for saved theme or default to light mode
            const currentTheme = localStorage.getItem('theme') || 'default';
            
            // Apply saved theme
            if (currentTheme === 'secondary') {
                body.classList.add('secondary-theme');
                themeToggle.checked = true;
            }
            
            // Listen for theme toggle changes
            themeToggle.addEventListener('change', () => {
                if (themeToggle.checked) {
                    body.classList.add('secondary-theme');
                    localStorage.setItem('theme', 'secondary');
                } else {
                    body.classList.remove('secondary-theme');
                    localStorage.setItem('theme', 'default');
                }
            });
        });
    </script>
</body>
</html>

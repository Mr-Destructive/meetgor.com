<header class="header">
  <a class="site-title" href="/{{ .Config.Blog.PrefixURL }}" aria-label="{{ .Config.Blog.Name }} - Home">{{ .Config.Blog.Name }}</a>
  <nav class="site-nav">
    <ul>
      <li><a href="/{{ .Config.Blog.PrefixURL }}" aria-label="Home">Home</a></li>
      <li><a href="/{{ .Config.Blog.PrefixURL }}posts" aria-label="Posts">Posts</a></li>
      <li><a href="/{{ .Config.Blog.PrefixURL }}all-content" aria-label="All Content">All Content</a></li>
      <li><a href="/{{ .Config.Blog.PrefixURL }}about" aria-label="About">About</a></li>
      <li><a href="/{{ .Config.Blog.PrefixURL }}now" aria-label="Now">Now</a></li>
      <li><a href="/{{ .Config.Blog.PrefixURL }}contact" aria-label="Contact">Contact</a></li>
    </ul>
  </nav>
  <form class="site-search" action="/{{ .Config.Blog.PrefixURL }}search" method="get" role="search" onsubmit="addPageContextToSearch(event)">
    <label class="visually-hidden" for="site-search-input">Search</label>
    <input id="site-search-input" name="q" type="search" placeholder="Search..." autocomplete="off">
    <input type="hidden" id="has-posts-input" name="context" value="">
  </form>
  <script>
    function addPageContextToSearch(event) {
      // Check if current page has posts to search
      const hasPostsOnPage = document.querySelectorAll('[data-search-entry]').length > 0;
      const contextInput = document.getElementById('has-posts-input');
      contextInput.value = hasPostsOnPage ? 'page' : 'full';
    }
  </script>
  <div class="theme-switch">
    <input type="checkbox" id="theme-toggle" aria-label="Toggle Theme">
    <label for="theme-toggle"></label>
  </div>
  {{ if .Config.AdminMode }}
    <button id="editor" onclick="location.href='/{{.Config.Blog.PrefixURL}}editor'" aria-label="Editor">
      Editor
    </button>
  {{ end }}
</header>
